name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_number }}-${{ github.actor }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  github-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./
        with:
          token: ${{ secrets.CODEBERG_TOKEN }}
